name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: swift build -c release
      - name: Playback behavior tests
        run: ./Tests/run-tests.sh
      - name: Security-sensitive artifact audit
        run: |
          ./scripts/verify-source.sh
